name: Create release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  issues: read

jobs:
  release:
    name: Release pushed tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          repo: ${{ github.repository }}
        run: |
          version=$(grep '^version' metadata.txt)
          version=${version#*=}
          version=${version//[[:space:]]/}
          tag="v$version"

          since=$(gh api "repos/$repo/releases/latest" --jq .created_at 2>/dev/null || true)
          latest_tag=$(gh api "repos/$repo/releases/latest" --jq .tag_name 2>/dev/null || true)

          search=""

          if [ -n "$since" ]; then
            search="closed:>$since"
          fi

          issues=$(gh issue list \
            --repo "$repo" \
            --state closed \
            --search "$search" \
            --json number,title,url \
            --jq '.[] | "- \(.title) ([#\(.number)](\(.url)))"')

          echo "## Wprowadzone zmiany" > notes.md
          echo >> notes.md
          echo "${issues:-- Brak zamkniętych zgłoszeń}" >> notes.md

          if [ -n "$latest_tag" ]; then
            echo >> notes.md
            echo "**Pełny Changelog**: https://github.com/$repo/compare/$latest_tag...$tag" >> notes.md
          fi

          gh release create "$tag" \
            --repo "$repo" \
            --title "$tag" \
            --notes-file notes.md 